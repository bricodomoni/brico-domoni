<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICO DOMONI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpg" href="Images/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header id="main-header">
        <div class="header-left">
            <img src="Images/logo.jpg" alt="BRICO DOMONI" id="top-logo">
        </div>
        <nav id="tabs-menu">
            <button class="tab-btn active" data-tab="accueil">Accueil</button>
            <button class="tab-btn" data-tab="services">Nos services</button>
            <button class="tab-btn" data-tab="galerie">Galerie</button>
            <button class="tab-btn" data-tab="produits">Produits</button>
            <button class="tab-btn" data-tab="apropos">À propos</button>
            <button class="tab-btn" data-tab="contact">Contact</button>
        </nav>
        <div class="header-right">
            <button class="cart-icon" id="open-cart-btn">
                <img src="Images/panier.png" class="cart-img" alt="Panier">
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <section class="tab-content active" id="accueil">
            <div class="slider">
                <div class="slides">
                    <img src="Images/Brouette.jpg" class="slide" alt="Brouette">
                    <img src="Images/9641602024.jpg" class="slide" alt="Outil">
                    <img src="Images/AST187429-XL.jpg" class="slide" alt="Évier">
                </div>
                <button class="slider-btn prev">❮</button>
                <button class="slider-btn next">❯</button>
            </div>
            <div class="hero">
                <h1>Bienvenue chez BRICO DOMONI</h1>
                <p>Votre partenaire bricolage à Domoni Riadhu.</p>
                <button class="hero-btn" id="go-to-products">Voir nos produits</button>
            </div>
        </section>

        <section class="tab-content" id="services"><h2>Nos Services</h2><p>Vente d'outils, électricité et plomberie.</p></section>
        <section class="tab-content" id="galerie"><h2>Galerie</h2><p>Photos de nos arrivages.</p></section>
        <section class="tab-content" id="produits">
            <h2>Nos Produits</h2>
            <div id="product-list" class="product-grid"></div>
        </section>
        <section class="tab-content" id="apropos"><h2>À Propos</h2><p>BRICO DOMONI à Domoni Riadhu.</p></section>
        <section class="tab-content" id="contact"><h2>Contact</h2><p>WhatsApp : +269 44 84 047</p></section>
    </main>

    <footer>
        <p>© 2026 BRICO DOMONI — Développé par Kaambi</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
