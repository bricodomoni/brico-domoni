<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICO DOMONI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header id="main-header">
        <img src="logo.jpg" id="top-logo" alt="Logo Brico Domoni">
        
        <nav id="tabs-menu">
            <button class="tab-btn active" data-tab="accueil">Accueil</button>
            <button class="tab-btn" data-tab="produits">Produits</button>
            <button class="tab-btn" data-tab="contact">Contact</button>
        </nav>

        <div class="cart-icon" id="open-cart-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" class="cart-img" alt="Panier">
            <span class="cart-count">0</span>
        </div>
    </header>

    <main class="tab-content active" id="accueil">
        <section class="slider">
            <div class="slides">
                <img src="Images/Brouette.jpg" class="slide" alt="Promo 1">
                <img src="Images/AST187429-XL.jpg" class="slide" alt="Promo 2">
            </div>
            <button class="slider-btn prev">❮</button>
            <button class="slider-btn next">❯</button>
        </section>
        <div style="text-align:center; padding: 50px;">
            <h1>Bienvenue chez BRICO DOMONI</h1>
            <p>Votre partenaire pour tous vos travaux de bricolage et construction.</p>
        </div>
    </main>

    <section class="tab-content" id="produits">
        <h2 style="text-align:center; margin-top:30px;">Nos Articles</h2>
        <div id="product-list" class="product-grid">
            </div>
    </section>

    <section class="tab-content" id="contact">
        <div style="text-align:center; padding: 50px;">
            <h2>Contactez-nous</h2>
            <p>📍 Domoni, Anjouan</p>
            <p>📞 +269 XXX XX XX</p>
        </div>
    </section>

    <div id="overlay"></div>
    <div id="cart-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Votre Panier</h3>
            <button id="close-cart" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <hr>
        <div id="cart-items">
            <p>Votre panier est vide</p>
        </div>
        <div style="margin-top:20px; font-weight:bold; font-size:1.2rem;">
            Total : <span id="cart-total">0 KMF</span>
        </div>
        <a href="#" id="whatsapp-btn">Commander via WhatsApp</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
