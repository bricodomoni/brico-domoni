<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICO DOMONI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="Images/Logo.png" alt="Logo BRICO" style="height: 50px;">
            </div>
            <div class="nav-links">
                <button class="tab-btn active" data-tab="home">Accueil</button>
                <button class="tab-btn" data-tab="products">Produits</button>
                <button class="tab-btn" data-tab="contact">Contact</button>
            </div>
            <div id="open-cart-btn" class="cart-icon-container">
                🛒 <span class="cart-count">0</span>
            </div>
        </nav>
    </header>

    <section id="home" class="tab-content active">
        <div class="slider">
            <div class="slide active"><img src="Images/Brouette.jpg" alt="Brouette"></div>
            <div class="slide"><img src="Images/9641602024.jpg" alt="Pelle"></div>
            <div class="slide"><img src="Images/AST187429-XL.jpg" alt="Evier"></div>
            <button class="prev">&#10094;</button>
            <button class="next">&#10095;</button>
        </div>
    </section>

    <section id="products" class="tab-content">
        <div id="product-list" class="product-grid"></div>
    </section>

    <section id="contact" class="tab-content">
        <div class="contact-container">
            <h2>Contactez-nous</h2>
            <p>📍 Domoni, Anjouan</p>
            <p>📞 +269 XXX XX XX</p>
        </div>
    </section>

    <div id="overlay"></div>
    <div id="cart-panel">
        <button id="close-cart">×</button>
        <h2>Votre Panier</h2>
        <div id="cart-items-container"></div>
        <div class="cart-footer">
            <p>Total : <span id="cart-total">0 KMF</span></p>
            <button id="whatsapp-order-btn">Commander sur WhatsApp</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
