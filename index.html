<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICO DOMONI RIADHU</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header id="main-header">
        <img id="top-logo" src="Images/logo.JPG" alt="Logo Brico Domoni">

        <nav id="tabs-menu">
            <button class="tab-btn active" data-tab="accueil">Accueil</button>
            <button class="tab-btn" data-tab="services">Nos services</button>
            <button class="tab-btn" data-tab="galerie">Galerie</button>
            <button class="tab-btn" data-tab="produits">Produits</button>
            <button class="tab-btn" data-tab="apropos">À propos</button>
            <button class="tab-btn" data-tab="contact">Contact</button>
        </nav>

        <div class="header-right">
            <div class="cart-icon">
                <img src="Images/panier.png" class="cart-img">
                <span id="cart-count" class="cart-count">0</span>
            </div>

            <button id="hamburger">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- MENU MOBILE -->
    <div id="mobile-menu">
        <button class="close-mobile">✖</button>
        <button class="mobile-link" data-tab="accueil">Accueil</button>
        <button class="mobile-link" data-tab="services">Nos services</button>
        <button class="mobile-link" data-tab="galerie">Galerie</button>
        <button class="mobile-link" data-tab="produits">Produits</button>
        <button class="mobile-link" data-tab="apropos">À propos</button>
        <button class="mobile-link" data-tab="contact">Contact</button>
    </div>

    <!-- SLIDER -->
    <div class="slider tab-content active" id="accueil">
        <button class="prev">❮</button>

        <div class="slides">
            <img src="Images/Brouette.jpg" class="slide">
            <img src="Images/9641602024.jpg" class="slide">
            <img src="Images/AST187429-XL.jpg" class="slide">
        </div>

        <button class="next">❯</button>
    </div>

    <!-- SECTIONS -->
    <section class="tab-content" id="services">
        <h2>Nos services</h2>
        <p>Contenu à ajouter…</p>
    </section>

    <section class="tab-content" id="galerie">
        <h2>Galerie</h2>
        <p>Contenu à ajouter…</p>
    </section>

    <section class="tab-content" id="produits">
        <h2>Produits</h2>
        <p>Contenu à ajouter…</p>
    </section>

    <section class="tab-content" id="apropos">
        <h2>À propos</h2>
        <p>Contenu à ajouter…</p>
    </section>

    <section class="tab-content" id="contact">
        <h2>Contact</h2>
        <p>Contenu à ajouter…</p>
    </section>

    <!-- PANIER -->
    <div id="cart-panel">
        <button id="close-cart">Fermer</button>
        <h2>Votre panier</h2>
        <p>Le panier est vide.</p>
    </div>

    <div id="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
