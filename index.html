<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICO DOMONI | Quincaillerie Anjouan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo.jpg" id="top-logo" alt="Logo" onclick="showTab('accueil')">
        <nav class="nav-links">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Rechercher..." onkeyup="searchProducts()">
                <span id="clear-search" onclick="clearSearch()">&times;</span>
            </div>
            <button class="tab-btn active" data-tab="accueil">Accueil</button>
            <button class="tab-btn" data-tab="produits">Produits</button>
            <button id="cart-icon-btn">🛒 <span id="cart-count">0</span></button>
        </nav>
    </header>

    <main>
        <section id="accueil" class="tab-content active">
            <div class="slider-container">
                <div class="slider">
                    <img src="Images/sl-brouette.jpg" class="slide active" alt="Brouette">
                    <img src="Images/sl-evier.jpg" class="slide" alt="Evier">
                    <img src="Images/sl-lame.jpg" class="slide" alt="Lame">
                    <button class="slider-btn prev">❮</button>
                    <button class="slider-btn next">❯</button>
                </div>
            </div>
            <div class="hero-welcome">
                <h1>BRICO DOMONI</h1>
                <p>La qualité professionnelle à Domoni, Anjouan.</p>
                <button class="shop-now" onclick="showTab('produits')">Découvrir nos produits</button>
            </div>
        </section>

        <section id="produits" class="tab-content">
            <div class="category-tabs">
                <button class="cat-btn active" onclick="filterProducts('all', this)">Tous</button>
                <button class="cat-btn" onclick="filterProducts('outils', this)">Outils</button>
                <button class="cat-btn" onclick="filterProducts('electricite', this)">Électricité</button>
                <button class="cat-btn" onclick="filterProducts('plomberie', this)">Plomberie</button>
                <button class="cat-btn" onclick="filterProducts('divers', this)">Divers</button>
            </div>
            <div id="product-list" class="product-grid"></div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>BRICO DOMONI</h3>
                <p>📍 Riadhu, face Pharmacie Dr Salim</p>
                <p>📞 +269 448 40 47</p>
            </div>
            <div class="footer-section">
                <h3>Horaires</h3>
                <p>Lun - Sam : 08h - 20h</p>
                <p>Dimanche : Ouvert</p>
            </div>
        </div>
        <div class="footer-bottom">© 2026 BRICO DOMONI</div>
    </footer>

    <div id="cart-overlay" class="overlay"></div>
    <div id="cart-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Mon Panier</h2>
            <button id="close-cart">&times;</button>
        </div>
        <div id="cart-items-list"></div>
        <div class="sidebar-footer">
            <div class="total-box">Total : <strong id="total-price">0 KMF</strong></div>
            <button id="whatsapp-send" class="btn-whatsapp">Commander sur WhatsApp</button>
        </div>
    </div>

    <div id="toast-notification" class="toast">Ajouté au panier !</div>

    <script src="script.js"></script>
</body>
</html>
