<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICO DOMONI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <img src="logo.jpg" id="top-logo" alt="Logo">
        <nav>
            <button class="tab-btn active" data-tab="accueil">Accueil</button>
            <button class="tab-btn" data-tab="produits">Produits</button>
        </nav>
    </header>

    <main id="accueil" class="tab-content active">
        <div class="slider">
            <img src="Images/Brouette.jpg" class="slide active" alt="Brouette">
            <img src="Images/AST187429-XL.jpg" class="slide" alt="Evier">
            <button class="slider-btn prev">❮</button>
            <button class="slider-btn next">❯</button>
        </div>
        <div style="text-align:center;">
            <h1>Bienvenue chez BRICO DOMONI</h1>
        </div>
    </main>

<section id="produits" class="tab-content">
    <h2 style="text-align:center; margin-top:30px;">Nos Articles</h2>
    <div id="product-list" class="product-grid">
        </div>
</section>

    <script src="script.js"></script>

    <div id="toast-notification" class="toast">Produit ajouté !</div>

<div id="cart-overlay" class="overlay"></div>
<div id="cart-sidebar" class="sidebar">
    <div class="sidebar-header">
        <h2>Mon Panier</h2>
        <button id="close-cart" class="close-btn">&times;</button>
    </div>
    <div id="cart-content" class="cart-items-container">
        </div>
    <div class="sidebar-footer">
        <div class="total-container">
            <span>Total:</span>
            <span id="cart-total-price">0 KMF</span>
        </div>
        <button id="whatsapp-order-btn" class="whatsapp-btn">Commander sur WhatsApp</button>
    </div>
</div>
    
</body>
</html>
